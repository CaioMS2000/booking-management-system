# Performance tuning
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
    
    # Logging
    log_format main_ext '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';
    
    access_log /var/log/nginx/access.log main_ext;
    error_log /var/log/nginx/error.log warn;
    
    # Upstream - MS Booking
    upstream ms_booking {
        least_conn;  # Algoritmo de balanceamento
        
        server ms-booking-instance-1:3000 max_fails=3 fail_timeout=30s weight=1;
        server ms-booking-instance-2:3000 max_fails=3 fail_timeout=30s weight=1;
        server ms-booking-instance-3:3000 max_fails=3 fail_timeout=30s weight=1;
        
        keepalive 32;  # Conexões persistentes
    }
    
    
    # Upstream - MS Auth
    upstream ms_auth {
        least_conn;
        
        server ms-auth-instance-1:3003 max_fails=3 fail_timeout=30s;
        server ms-auth-instance-2:3003 max_fails=3 fail_timeout=30s;
        
        keepalive 32;
    }
    
    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name api.booking.com;
        return 301 https://$server_name$request_uri;
    }
    
    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name api.booking.com;
        
        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # Request size limits
        client_max_body_size 10M;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Proxy headers (padrão)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;  # Para tracing
        
        # Health check endpoint (Nginx não valida auth aqui)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # MS - Booking (SEM validação de auth no Nginx)
        location /api/v1/properties {
            proxy_pass http://ms_booking;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        
        location /api/v1/listings {
            proxy_pass http://ms_booking;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        
        # Auth (público para login/registro)
        location /api/v1/auth {
            proxy_pass http://ms_auth;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        
        location /api/v1/guests {
            proxy_pass http://ms_auth;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/v1/admins {
            proxy_pass http://ms_auth;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/v1/hosts {
            proxy_pass http://ms_auth;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}